<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Miyako Maji — 日本旅遊記帳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Teal-blue gradient palette ── */
  --ink:       #1a4a4a;
  --ink-light: #2a6666;
  --ink-faint: #6aadad;
  --paper:     #f0f7f7;
  --paper-2:   #e4f0f0;
  --paper-3:   #d4e8e8;
  --paper-4:   #c2dddd;
  --warm:      #e8f8f0;
  --warm-2:    #b8e8d0;
  --green:     #1a7a5a;
  --green-bg:  #c8f0e0;
  --red:       #c0392b;
  --red-bg:    #fde8e8;
  --outline:   #a8cccc;
  --muted:     #2a4a4a;
  --muted2:    #5a8080;
  --serif:     'Noto Serif JP', serif;
  --sans:      'Plus Jakarta Sans', sans-serif;
  --r-sm: 1rem;
  --r-md: 1.5rem;
  --r-lg: 2rem;
  --r-xl: 3rem;
  --r-full: 9999px;
  /* gradient stops from the image */
  --grad-top:    #5a9ea0;
  --grad-mid:    #3d8080;
  --grad-bot:    #2a6b6b;
  --grad-accent: #7ec8c8;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; -webkit-text-size-adjust: 100%; }

body {
  font-family: var(--sans);
  background: linear-gradient(160deg, #7ec8c8 0%, #4a9494 30%, #2d7070 65%, #1a5555 100%);
  background-attachment: fixed;
  color: var(--ink);
  min-height: 100dvh;
  padding-bottom: calc(80px + env(safe-area-inset-bottom));
  overflow-x: hidden;
  color-scheme: light;
}

/* ── NAV ── */
.top-nav {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.25rem 1.5rem;
  margin: 0.75rem 1rem 0;
  border-radius: var(--r-md);
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 0.5px solid rgba(255,255,255,0.15);
}
.nav-title { font-family: var(--serif); font-weight: 300; font-size: 1.4rem; letter-spacing: -0.03em; color: #fff; }
.nav-right { display: flex; align-items: center; gap: 0.75rem; }

/* ── DAY PILLS ── */
.day-strip { display: flex; gap: 6px; flex-wrap: nowrap; overflow-x: auto; padding: 0.75rem 1.5rem 0.75rem; scrollbar-width: none; }
.day-strip::-webkit-scrollbar { display: none; }
.day-pill {
  flex-shrink: 0;
  padding: 5px 14px; border-radius: var(--r-full);
  border: 0.5px solid rgba(255,255,255,0.35);
  background: rgba(255,255,255,0.12); cursor: pointer;
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,0.75); letter-spacing: 0.05em;
  transition: all 0.2s;
}
.day-pill.active {
  background: rgba(255,255,255,0.92); color: var(--ink);
  border-color: transparent;
}

/* ── BUDGET HERO ── */
.budget-hero {
  margin: 0.5rem 1.5rem 1rem;
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 0.5px solid rgba(255,255,255,0.3);
  border-radius: var(--r-lg);
  padding: 1.5rem;
  color: #fff;
  position: relative; overflow: hidden;
}
.budget-hero::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 85% 10%, rgba(255,255,255,0.12) 0%, transparent 55%);
  pointer-events: none;
}
.budget-hero-label {
  font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
  color: rgba(255,255,255,0.6); margin-bottom: 0.4rem;
}
.budget-hero-remain {
  font-family: var(--serif); font-size: 2.4rem; font-weight: 300;
  line-height: 1.1; margin-bottom: 0.15rem; color: #fff;
}
.budget-hero-sub { font-size: 12px; color: rgba(255,255,255,0.55); margin-bottom: 1rem; }
.budget-prog-track {
  height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden;
  margin-bottom: 1rem;
}
.budget-prog-fill {
  height: 100%; border-radius: 2px;
  background: rgba(255,255,255,0.85);
  transition: width 0.4s ease;
}
.budget-prog-fill.warn { background: #ffb3ae; }
.budget-row-nums {
  display: flex; justify-content: space-between; align-items: flex-end;
}
.budget-spent-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.55); }
.budget-spent-val { font-family: var(--serif); font-size: 1.1rem; font-weight: 400; color: rgba(255,255,255,0.9); }
.budget-rate { font-size: 10px; color: rgba(255,255,255,0.35); text-align: right; }

/* ── STAT CARDS ── */
.stat-row { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 10px; padding: 0 1.5rem 1rem; }
.stat-card {
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 0.5px solid rgba(255,255,255,0.28);
  border-radius: var(--r-sm); padding: 0.875rem 0.875rem;
}
.stat-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
.stat-val { font-family: var(--serif); font-size: 1rem; font-weight: 400; color: #fff; line-height: 1.2; }
.stat-sub { font-size: 10px; color: rgba(255,255,255,0.55); margin-top: 2px; }
.stat-val.green { color: #a8f0d0; }

/* ── CONTENT AREA ── */
.content { padding: 0 1.5rem; }

/* ── SECTION HEADING ── */
.section-eyebrow {
  font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--muted2); margin-bottom: 0.5rem; display: block;
}
/* eyebrow on gradient bg (before content card) */
.page > .content > .section-eyebrow { color: rgba(255,255,255,0.6); }

/* ── ADD FORM ── */
.form-card {
  background: rgba(255,255,255,0.92);
  border: 0.5px solid rgba(255,255,255,0.6);
  border-radius: var(--r-md);
  padding: 1.25rem;
  box-shadow: 0 8px 32px rgba(26,80,80,0.15);
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-full { grid-column: 1/-1; }
.field-label {
  display: block; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--muted2); margin-bottom: 6px;
}
.field-input, .field-select {
  width: 100%; padding: 9px 12px;
  border-radius: var(--r-sm);
  border: 0.5px solid var(--outline);
  background: var(--paper-2);
  color: var(--ink); font-family: var(--sans); font-size: 14px;
  transition: border-color 0.15s;
  appearance: none; -webkit-appearance: none;
}
.field-input:focus, .field-select:focus { outline: none; border-color: var(--ink-faint); }
.field-input::placeholder { color: var(--muted2); }
.amount-row { display: flex; gap: 8px; align-items: stretch; }
.amount-row .field-input { flex: 1; }
.cur-toggle {
  display: flex; border-radius: var(--r-sm); border: 0.5px solid var(--outline); overflow: hidden; flex-shrink: 0;
}
.cur-btn {
  padding: 0 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  background: none; border: none; cursor: pointer;
  color: var(--muted2); font-family: var(--sans);
  transition: all 0.15s;
}
.cur-btn.active { background: linear-gradient(135deg, #3d9494, #1a6666); color: #fff; }
.convert-hint { font-size: 11px; color: var(--muted2); margin-top: 5px; font-style: italic; min-height: 16px; }
.split-row { display: flex; gap: 8px; flex-wrap: wrap; }
.split-check {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; cursor: pointer; color: var(--muted);
}
.split-check input { width: auto; accent-color: var(--ink); }
.btn-submit {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, #3d9494, #1a6666); color: #fff;
  border: none; border-radius: var(--r-full);
  font-family: var(--sans); font-size: 12px; font-weight: 600;
  letter-spacing: 0.15em; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(26,80,80,0.25);
}
.btn-submit:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-submit:active { transform: scale(0.98); }

/* ── EXPENSE LIST ── */
.exp-list { display: flex; flex-direction: column; gap: 8px; }
.exp-item {
  display: flex; align-items: center; gap: 12px;
  background: rgba(255,255,255,0.88); border: 0.5px solid rgba(255,255,255,0.5);
  border-radius: var(--r-sm); padding: 0.875rem 1rem;
}
.exp-cat-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--paper-3); display: flex; align-items: center;
  justify-content: center; font-size: 17px; flex-shrink: 0;
}
.exp-info { flex: 1; min-width: 0; }
.exp-name { font-size: 14px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.exp-meta { font-size: 11px; color: var(--muted2); margin-top: 1px; }
.exp-amounts { text-align: right; flex-shrink: 0; }
.exp-primary { font-family: var(--serif); font-size: 15px; font-weight: 400; color: var(--ink); }
.exp-secondary { font-size: 11px; color: var(--muted2); }
.exp-del { width: 28px; height: 28px; border: none; background: none; cursor: pointer; color: var(--outline); font-size: 18px; padding: 0; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: all 0.15s; }
.exp-del:hover { background: var(--red-bg); color: var(--red); }

/* ── SPLIT / DEBT ── */
.debt-list { display: flex; flex-direction: column; gap: 8px; }
.debt-item {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px;
  background: rgba(255,255,255,0.88); border: 0.5px solid rgba(255,255,255,0.5);
  border-radius: var(--r-sm); padding: 0.875rem 1rem;
}
.debt-label { font-size: 14px; color: var(--ink); }
.debt-badge {
  display: inline-block; padding: 2px 8px; border-radius: var(--r-full);
  font-size: 10px; letter-spacing: 0.05em;
  background: rgba(26,74,74,0.08); color: var(--muted2); margin-left: 6px;
}
.debt-right { display: flex; align-items: center; gap: 8px; }
.debt-amt { font-family: var(--serif); font-size: 15px; font-weight: 400; }
.debt-amt.owe { color: var(--red); }
.debt-amt.owed { color: var(--green); }
.debt-settle-btn {
  padding: 4px 12px; border-radius: var(--r-full);
  border: 0.5px solid var(--outline); background: none;
  font-size: 11px; letter-spacing: 0.05em; cursor: pointer;
  color: var(--muted2); font-family: var(--sans);
  transition: all 0.15s;
}
.debt-settle-btn:hover { border-color: var(--green); color: var(--green); }
.settled-tag { font-size: 11px; color: var(--green); }

/* ── NOTES ── */
.notes-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.note-add-btn {
  padding: 6px 16px; border-radius: var(--r-full);
  border: 0.5px solid var(--outline); background: none;
  font-family: var(--sans); font-size: 11px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
  color: rgba(255,255,255,0.85); transition: all 0.15s;
}
.note-add-btn:hover { background: rgba(255,255,255,0.25); }
.note-card {
  background: rgba(255,255,255,0.88);
  border: 0.5px solid rgba(255,255,255,0.5);
  border-radius: var(--r-md);
  padding: 1rem 1.125rem;
  margin-bottom: 10px;
  position: relative;
}
.note-card::before {
  content: '';
  position: absolute; left: 0; top: 1rem; bottom: 1rem; width: 3px;
  background: linear-gradient(to bottom, #7ec8c8, #3d8080);
  border-radius: 0 2px 2px 0;
}
.note-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.note-title-input {
  flex: 1; border: none; background: none;
  font-family: var(--serif); font-size: 15px; font-weight: 400;
  color: var(--ink); outline: none; padding: 0;
}
.note-title-input::placeholder { color: var(--muted2); font-weight: 300; font-style: italic; }
.note-date { font-size: 10px; color: var(--muted2); letter-spacing: 0.05em; flex-shrink: 0; }
.note-del { border: none; background: none; cursor: pointer; color: var(--outline); font-size: 17px; padding: 0; flex-shrink: 0; transition: color 0.15s; }
.note-del:hover { color: var(--red); }
.calligraphy-line {
  height: 0.5px;
  background: linear-gradient(to right, transparent, var(--outline) 20%, var(--outline) 80%, transparent);
  margin-bottom: 8px;
}
.note-body {
  width: 100%; min-height: 72px;
  border: none; background: none;
  font-family: var(--sans); font-size: 13px; line-height: 1.7;
  color: var(--muted); resize: vertical; outline: none;
}
.note-body::placeholder { color: var(--muted2); }
.note-tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.note-tag {
  padding: 3px 10px; border-radius: var(--r-full);
  font-size: 10px; letter-spacing: 0.05em;
  border: 0.5px solid var(--outline); background: none;
  cursor: pointer; color: var(--muted2); font-family: var(--sans);
  transition: all 0.15s;
}
.note-tag.on {
  background: linear-gradient(135deg, #3d9494, #1a6666); border-color: transparent; color: #fff;
}

/* ── SETTINGS ── */
.settings-section { margin-bottom: 1.5rem; }
.settings-section-title {
  font-family: var(--serif); font-size: 1.1rem; font-weight: 300;
  color: rgba(255,255,255,0.9); margin-bottom: 1rem;
  display: flex; align-items: center; justify-content: space-between;
}
.settings-card {
  background: rgba(255,255,255,0.88); border: 0.5px solid rgba(255,255,255,0.5);
  border-radius: var(--r-md); padding: 1.25rem;
}
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.settings-full { grid-column: 1/-1; }
.traveler-list { display: flex; flex-direction: column; gap: 8px; }
.traveler-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 1rem;
  background: rgba(26,74,74,0.06); border-radius: var(--r-sm);
  border: 0.5px solid transparent;
  transition: border-color 0.15s;
}
.traveler-item:hover { border-color: var(--outline); }
.traveler-left { display: flex; align-items: center; gap: 10px; }
.traveler-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 14px; font-weight: 400;
  background: var(--warm); color: var(--ink); flex-shrink: 0;
}
.traveler-avatar.green { background: var(--green-bg); color: var(--green); }
.traveler-name { font-size: 14px; font-weight: 500; color: var(--ink); }
.traveler-role { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted2); }
.settings-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 0; margin-top: 0.5rem;
}
.settings-note { font-size: 11px; color: rgba(255,255,255,0.5); }
.btn-danger {
  padding: 5px 14px; border-radius: var(--r-full);
  border: 0.5px solid var(--red); background: none;
  font-size: 11px; color: var(--red); cursor: pointer;
  font-family: var(--sans); letter-spacing: 0.05em;
  transition: all 0.15s;
}
.btn-danger:hover { background: var(--red-bg); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: rgba(30,80,80,0.75);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 0.5px solid rgba(255,255,255,0.15);
  border-radius: var(--r-lg) var(--r-lg) 0 0;
  padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
  display: flex; justify-content: space-around; align-items: center;
  box-shadow: 0 -4px 32px rgba(0,0,0,0.12);
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 6px 14px; border-radius: var(--r-full);
  border: none; background: none; cursor: pointer;
  color: rgba(255,255,255,0.45); transition: all 0.25s;
  font-family: var(--sans);
}
.nav-btn.active {
  background: rgba(255,255,255,0.2); color: #fff;
  transform: translateY(-2px);
}
.nav-icon { font-size: 20px; line-height: 1; }
.nav-label { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600; }

/* ── PAGES ── */
.page { display: none; padding-top: 0.5rem; }
.page.active { display: block; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 3rem 1rem;
  color: rgba(255,255,255,0.55); font-size: 13px;
}
.empty-state-icon { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.5; }

/* ── RESPONSIVE ── */
@media (max-width: 400px) {
  .stat-row { grid-template-columns: 1fr 1fr; }
  .budget-hero-remain { font-size: 2rem; }
  .form-grid { grid-template-columns: 1fr; }
  .form-full { grid-column: 1; }
  .settings-grid { grid-template-columns: 1fr; }
  .settings-full { grid-column: 1; }
}
</style>
</head>
<body>

<!-- Top Nav -->
<nav class="top-nav">
  <div>
    <div style="font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:2px">Travel Budget</div>
    <div class="nav-title">Miyako Maji</div>
  </div>
  <div class="nav-right">
    <span style="font-size:22px">🇯🇵</span>
  </div>
</nav>

<!-- Day Filter Strip -->
<div class="day-strip">
  <button class="day-pill active" onclick="setDay('all')">全部</button>
  <button class="day-pill" onclick="setDay('pre')">行前</button>
  <button class="day-pill" onclick="setDay(1)">Day 1</button>
  <button class="day-pill" onclick="setDay(2)">Day 2</button>
  <button class="day-pill" onclick="setDay(3)">Day 3</button>
  <button class="day-pill" onclick="setDay(4)">Day 4</button>
</div>

<!-- Budget Hero -->
<div class="budget-hero">
  <div class="budget-hero-label">Remaining Budget</div>
  <div class="budget-hero-remain" id="remain-twd">NT$0</div>
  <div class="budget-hero-sub" id="rate-hint">1 JPY = 0.22 TWD</div>
  <div class="budget-prog-track">
    <div class="budget-prog-fill" id="prog-fill" style="width:0%"></div>
  </div>
  <div class="budget-row-nums">
    <div>
      <div class="budget-spent-label">Spent</div>
      <div class="budget-spent-val" id="spent-twd">NT$0</div>
    </div>
    <div class="budget-rate" id="budget-display">Budget —</div>
  </div>
</div>

<!-- Stat Cards -->
<div class="stat-row">
  <div class="stat-card">
    <div class="stat-label">日圓花費</div>
    <div class="stat-val" id="total-jpy">¥0</div>
    <div class="stat-sub" id="total-twd-sub">NT$0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">我付出</div>
    <div class="stat-val" id="my-total">NT$0</div>
    <div class="stat-sub">含代墊</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">應收回</div>
    <div class="stat-val green" id="owed-me">NT$0</div>
    <div class="stat-sub" id="i-owe-sub">我欠 NT$0</div>
  </div>
</div>

<!-- ── PAGES ── -->

<!-- PAGE: ADD -->
<div class="page active" id="page-add">
  <div class="content">
    <span class="section-eyebrow">New Entry</span>
    <div class="form-card">
      <div class="form-grid">
        <div class="form-full">
          <label class="field-label">項目名稱</label>
          <input class="field-input" id="exp-name" type="text" placeholder="例：東京車站午餐" />
        </div>
        <div>
          <label class="field-label">金額</label>
          <div class="amount-row">
            <input class="field-input" id="exp-amount" type="number" placeholder="0" oninput="updateTWDPreview()" />
            <div class="cur-toggle">
              <button type="button" id="btn-jpy" class="cur-btn active" onclick="setCurrency('JPY')">JPY</button>
              <button type="button" id="btn-twd" class="cur-btn" onclick="setCurrency('TWD')">TWD</button>
            </div>
          </div>
          <div class="convert-hint" id="twd-preview"></div>
        </div>
        <div>
          <label class="field-label">類別</label>
          <select class="field-select" id="exp-cat">
            <option value="🍜">🍜 餐飲</option>
            <option value="🚃">🚃 交通</option>
            <option value="🏨">🏨 住宿</option>
            <option value="🛍️">🛍️ 購物</option>
            <option value="🎡">🎡 活動</option>
            <option value="💊">💊 其他</option>
          </select>
        </div>
        <div>
          <label class="field-label">天數</label>
          <select class="field-select" id="exp-day">
            <option value="pre">行前花費</option>
            <option value="1">Day 1</option>
            <option value="2">Day 2</option>
            <option value="3">Day 3</option>
            <option value="4">Day 4</option>
          </select>
        </div>
        <div>
          <label class="field-label">付款人</label>
          <select class="field-select" id="exp-payer"></select>
        </div>
        <div>
          <label class="field-label">分攤給</label>
          <div class="split-row" id="split-checks"></div>
        </div>
      </div>
      <button class="btn-submit" onclick="addExpense()">＋ 記錄支出</button>
    </div>
  </div>
</div>

<!-- PAGE: LEDGER -->
<div class="page" id="page-list">
  <div class="content">
    <span class="section-eyebrow">Expense Ledger</span>
    <div class="exp-list" id="expense-list">
      <div class="empty-state"><div class="empty-state-icon">📜</div>尚無支出記錄</div>
    </div>
  </div>
</div>

<!-- PAGE: SPLIT -->
<div class="page" id="page-split">
  <div class="content">
    <span class="section-eyebrow">Settlement</span>
    <div class="debt-list" id="debt-list">
      <div class="empty-state"><div class="empty-state-icon">⚖️</div>尚無分帳記錄</div>
    </div>
  </div>
</div>

<!-- PAGE: NOTES -->
<div class="page" id="page-notes">
  <div class="content">
    <div class="notes-header">
      <span class="section-eyebrow" style="margin:0">Journey Notes</span>
      <button class="note-add-btn" onclick="addNote()">＋ 新增記事</button>
    </div>
    <div id="notes-list"></div>
    <div class="empty-state" id="notes-empty"><div class="empty-state-icon">🖋️</div>旅途中的點滴，都值得記下來</div>
  </div>
</div>

<!-- PAGE: SETTINGS -->
<div class="page" id="page-settings">
  <div class="content">

    <div class="settings-section">
      <div class="settings-section-title">
        <span>Currency &amp; Budget</span>
        <span style="font-size:18px;opacity:0.4">💴</span>
      </div>
      <div class="settings-card">
        <div class="settings-grid">
          <div>
            <label class="field-label">匯率 (1 JPY = ? TWD)</label>
            <input class="field-input" id="rate-input" type="number" value="0.22" step="0.001" oninput="updateRate()" />
          </div>
          <div>
            <label class="field-label">總預算 (NT$)</label>
            <input class="field-input" id="budget-input" type="number" value="30000" oninput="state.budget=parseInt(this.value)||30000;saveData();refreshAll();" />
          </div>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">
        <span>Travelers</span>
        <span style="font-size:18px;opacity:0.4">👥</span>
      </div>
      <div class="settings-card">
        <div class="settings-grid" style="margin-bottom:1rem">
          <div>
            <label class="field-label">我的名字</label>
            <input class="field-input" id="my-name-input" type="text" value="我" oninput="updateMyName()" />
          </div>
          <div>
            <label class="field-label">同行夥伴 (逗號分隔)</label>
            <input class="field-input" id="people-input" type="text" value="小花,小明" oninput="updatePeople()" />
          </div>
        </div>
        <div class="traveler-list" id="traveler-list"></div>
      </div>
    </div>

    <div class="settings-footer">
      <span class="settings-note">資料自動存檔於本機</span>
      <button class="btn-danger" onclick="clearAllData()">清除所有資料</button>
    </div>

  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchPage('add')" id="nav-add">
    <span class="nav-icon">✏️</span>
    <span class="nav-label">記帳</span>
  </button>
  <button class="nav-btn" onclick="switchPage('list')" id="nav-list">
    <span class="nav-icon">📋</span>
    <span class="nav-label">明細</span>
  </button>
  <button class="nav-btn" onclick="switchPage('split')" id="nav-split">
    <span class="nav-icon">⚖️</span>
    <span class="nav-label">分帳</span>
  </button>
  <button class="nav-btn" onclick="switchPage('notes')" id="nav-notes">
    <span class="nav-icon">🖋️</span>
    <span class="nav-label">記事</span>
  </button>
  <button class="nav-btn" onclick="switchPage('settings')" id="nav-settings">
    <span class="nav-icon">⚙️</span>
    <span class="nav-label">設定</span>
  </button>
</nav>

<script>
const STORAGE_KEY = 'japan_trip_v2';

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ state, notes })); } catch(e) {}
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (saved.state) { Object.assign(state, saved.state); state.currentDay = 'all'; }
    if (saved.notes) notes = saved.notes;
  } catch(e) {}
}

let state = {
  rate: 0.22, budget: 30000,
  myName: '我', people: ['小花', '小明'],
  expenses: [], settled: {}, currentDay: 'all'
};

let notes = [];
let activeCurrency = 'JPY';
let activePage = 'add';

// ── Helpers ──
function allPeople() { return [state.myName, ...state.people]; }
function jpy2twd(jpy) { return Math.round(jpy * state.rate); }
function exp2twd(e) {
  if (e.currency === 'TWD' || e.day === 'pre') return (e.twd != null) ? e.twd : e.jpy;
  return jpy2twd(e.jpy);
}
function expOriginal(e) {
  if (e.currency === 'TWD' || (e.day === 'pre' && e.currency !== 'JPY'))
    return { sym: 'NT$', amt: (e.twd != null) ? e.twd : e.jpy };
  return { sym: '¥', amt: e.jpy };
}
function fmt(n) { return Number(n).toLocaleString(); }

// ── Day filter ──
function setDay(d) {
  state.currentDay = d;
  const keys = ['all','pre',1,2,3,4];
  document.querySelectorAll('.day-pill').forEach((b,i) => b.classList.toggle('active', keys[i]===d));
  refreshAll();
  if (activePage === 'list') renderList();
}

function filteredExpenses() {
  if (state.currentDay === 'all') return state.expenses;
  return state.expenses.filter(e => e.day === state.currentDay);
}

// ── Page switching ──
function switchPage(p) {
  activePage = p;
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  document.getElementById('nav-' + p).classList.add('active');
  if (p === 'list') renderList();
  if (p === 'split') renderSplit();
  if (p === 'notes') renderNotes();
  if (p === 'settings') renderTravelers();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Refresh stats ──
function refreshAll() {
  const exps = filteredExpenses();
  const totalJpy = exps.filter(e => e.currency==='JPY'||(!e.currency&&e.day!=='pre')).reduce((s,e) => s+(e.jpy||0), 0);
  const totalTwd = exps.reduce((s,e) => s + exp2twd(e), 0);
  const budget = state.budget || 30000;
  const remain = budget - totalTwd;
  const pct = Math.min(100, Math.round(totalTwd / budget * 100));

  document.getElementById('total-jpy').textContent = '¥' + fmt(totalJpy);
  document.getElementById('total-twd-sub').textContent = 'NT$' + fmt(totalTwd);
  document.getElementById('spent-twd').textContent = 'NT$' + fmt(totalTwd);
  document.getElementById('remain-twd').textContent = 'NT$' + fmt(remain);
  document.getElementById('rate-hint').textContent = `1 JPY = ${state.rate} TWD`;
  document.getElementById('budget-display').textContent = `Budget NT$${fmt(budget)}`;

  const fill = document.getElementById('prog-fill');
  fill.style.width = pct + '%';
  fill.classList.toggle('warn', pct >= 85);

  const myName = state.myName;
  let myPaid = 0, myOwes = 0, othersOweMe = 0;
  state.expenses.forEach(e => {
    const twd = exp2twd(e);
    const share = e.split.length > 0 ? Math.round(twd / e.split.length) : twd;
    if (e.payer === myName) {
      myPaid += twd;
      e.split.forEach(p => { if (p !== myName) othersOweMe += share; });
    } else {
      if (e.split.includes(myName)) myOwes += share;
    }
  });
  document.getElementById('my-total').textContent = 'NT$' + fmt(myPaid);
  document.getElementById('owed-me').textContent = 'NT$' + fmt(othersOweMe);
  document.getElementById('i-owe-sub').textContent = '我欠 NT$' + fmt(myOwes);
}

// ── Currency toggle ──
function setCurrency(cur) {
  activeCurrency = cur;
  document.getElementById('btn-jpy').classList.toggle('active', cur==='JPY');
  document.getElementById('btn-twd').classList.toggle('active', cur==='TWD');
  updateTWDPreview();
}

function updateTWDPreview() {
  const amt = parseInt(document.getElementById('exp-amount').value) || 0;
  const el = document.getElementById('twd-preview');
  if (activeCurrency === 'TWD') {
    el.textContent = amt > 0 ? '台幣直接記帳' : '';
  } else {
    el.textContent = amt > 0 ? `≈ NT$${fmt(jpy2twd(amt))}` : '';
  }
}

// ── Add expense ──
function addExpense() {
  const name = document.getElementById('exp-name').value.trim();
  const amt = parseInt(document.getElementById('exp-amount').value) || 0;
  if (!name || !amt) { alert('請填寫名稱和金額'); return; }
  const cat = document.getElementById('exp-cat').value;
  const dayVal = document.getElementById('exp-day').value;
  const day = dayVal === 'pre' ? 'pre' : parseInt(dayVal);
  const payer = document.getElementById('exp-payer').value;
  const split = Array.from(document.querySelectorAll('#split-checks input:checked')).map(c => c.value);
  if (split.length === 0) split.push(payer);
  const currency = activeCurrency;
  const expense = { id: Date.now(), name, cat, day, payer, split, currency };
  if (currency === 'JPY') { expense.jpy = amt; expense.twd = null; }
  else { expense.twd = amt; expense.jpy = null; }
  state.expenses.push(expense);
  document.getElementById('exp-name').value = '';
  document.getElementById('exp-amount').value = '';
  document.getElementById('twd-preview').textContent = '';
  saveData(); refreshAll(); renderList(); renderSplit();
}

function deleteExpense(id) {
  state.expenses = state.expenses.filter(e => e.id !== id);
  saveData(); refreshAll(); renderList(); renderSplit();
}

// ── Render list ──
function renderList() {
  const exps = filteredExpenses();
  const el = document.getElementById('expense-list');
  if (exps.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📜</div>尚無支出記錄</div>';
    return;
  }
  el.innerHTML = [...exps].reverse().map(e => {
    const twd = exp2twd(e);
    const orig = expOriginal(e);
    const dayLabel = e.day === 'pre' ? '行前' : 'Day ' + e.day;
    return `<div class="exp-item">
      <div class="exp-cat-icon">${e.cat}</div>
      <div class="exp-info">
        <div class="exp-name">${e.name}</div>
        <div class="exp-meta">${dayLabel} · ${e.payer} · ${e.split.join('、')}</div>
      </div>
      <div class="exp-amounts">
        <div class="exp-primary">${orig.sym}${fmt(orig.amt)}</div>
        <div class="exp-secondary">${orig.sym === 'NT$' ? '' : 'NT$' + fmt(twd)}</div>
      </div>
      <button class="exp-del" onclick="deleteExpense(${e.id})">×</button>
    </div>`;
  }).join('');
}

// ── Render split ──
function renderSplit() {
  const el = document.getElementById('debt-list');
  const debts = {};
  const all = allPeople();
  all.forEach(p => { debts[p] = {}; all.forEach(q => { if (p !== q) debts[p][q] = 0; }); });

  state.expenses.forEach(e => {
    const twd = exp2twd(e);
    const share = e.split.length > 0 ? Math.round(twd / e.split.length) : twd;
    e.split.forEach(p => {
      if (p !== e.payer && debts[p] && debts[p][e.payer] !== undefined)
        debts[p][e.payer] += share;
    });
  });

  const lines = [];
  all.forEach(debtor => {
    all.forEach(creditor => {
      if (debtor === creditor) return;
      const d = (debts[debtor]?.[creditor]||0) - (debts[creditor]?.[debtor]||0);
      const key = [debtor, creditor].sort().join('|');
      if (d > 0 && !lines.find(l => l.key === key)) {
        lines.push({ key, debtor, creditor, amount: d, settled: state.settled[key]||0 });
      }
    });
  });

  if (lines.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚖️</div>大家都還清了！</div>';
    return;
  }

  el.innerHTML = lines.map(l => {
    const remain = l.amount - l.settled;
    const isMe = l.debtor === state.myName;
    const label = isMe ? `我欠 ${l.creditor}` : `${l.debtor} 欠 ${l.creditor}`;
    return `<div class="debt-item">
      <div class="debt-label">${label}<span class="debt-badge">NT$${fmt(l.amount)}</span></div>
      <div class="debt-right">
        <div class="debt-amt ${isMe?'owe':'owed'}">NT$${fmt(Math.max(0,remain))}</div>
        ${remain > 0
          ? `<button class="debt-settle-btn" onclick="settle('${l.key}',${l.amount})">已還清</button>`
          : `<span class="settled-tag">✓ 結清</span>`}
      </div>
    </div>`;
  }).join('');
}

function settle(key, amount) {
  state.settled[key] = amount;
  saveData(); renderSplit(); refreshAll();
}

// ── Notes ──
const NOTE_TAGS = ['📍 景點','🍜 美食','🛍️ 購物','💡 提醒','✈️ 交通'];

function addNote() {
  const id = Date.now();
  const now = new Date();
  const dateStr = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  notes.unshift({ id, title: '', body: '', tag: '', date: dateStr });
  saveData(); renderNotes();
  setTimeout(() => { const el = document.getElementById('note-title-'+id); if (el) el.focus(); }, 60);
}

function deleteNote(id) { notes = notes.filter(n => n.id !== id); saveData(); renderNotes(); }
function updateNoteTitle(id, val) { const n = notes.find(n => n.id===id); if (n) { n.title = val; saveData(); } }
function updateNoteBody(id, val) { const n = notes.find(n => n.id===id); if (n) { n.body = val; saveData(); } }
function toggleNoteTag(id, tag) {
  const n = notes.find(n => n.id===id); if (!n) return;
  n.tag = n.tag === tag ? '' : tag;
  saveData(); renderNotes();
}

function renderNotes() {
  const list = document.getElementById('notes-list');
  const empty = document.getElementById('notes-empty');
  if (notes.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.innerHTML = notes.map(n => `
    <div class="note-card">
      <div class="note-card-head">
        <input class="note-title-input" id="note-title-${n.id}" type="text"
          placeholder="記事標題…" value="${n.title.replace(/"/g,'&quot;')}"
          oninput="updateNoteTitle(${n.id}, this.value)" />
        <span class="note-date">${n.date}</span>
        <button class="note-del" onclick="deleteNote(${n.id})">×</button>
      </div>
      <div class="calligraphy-line"></div>
      <textarea class="note-body" placeholder="記下景點筆記、店家資訊、注意事項…"
        oninput="updateNoteBody(${n.id}, this.value)">${n.body}</textarea>
      <div class="note-tag-row">
        ${NOTE_TAGS.map(tag => `<button class="note-tag${n.tag===tag?' on':''}" onclick="toggleNoteTag(${n.id},'${tag}')">${tag}</button>`).join('')}
      </div>
    </div>`).join('');
}

// ── Settings ──
function updateRate() {
  const v = parseFloat(document.getElementById('rate-input').value);
  if (!isNaN(v) && v > 0) { state.rate = v; saveData(); refreshAll(); }
}

function updateMyName() {
  state.myName = document.getElementById('my-name-input').value || '我';
  saveData(); refreshPeopleUI(); refreshAll(); renderTravelers();
}

function updatePeople() {
  const raw = document.getElementById('people-input').value;
  state.people = raw.split(',').map(s => s.trim()).filter(Boolean).slice(0, 4);
  saveData(); refreshPeopleUI(); refreshAll(); renderTravelers();
}

function refreshPeopleUI() {
  const all = allPeople();
  const payer = document.getElementById('exp-payer');
  const cur = payer.value;
  payer.innerHTML = all.map(p => `<option value="${p}">${p}</option>`).join('');
  if (all.includes(cur)) payer.value = cur;
  document.getElementById('split-checks').innerHTML =
    all.map(p => `<label class="split-check"><input type="checkbox" value="${p}" checked /> ${p}</label>`).join('');
}

function renderTravelers() {
  const all = allPeople();
  document.getElementById('traveler-list').innerHTML = all.map((p, i) => `
    <div class="traveler-item">
      <div class="traveler-left">
        <div class="traveler-avatar ${i>0?'green':''}">${p.charAt(0)}</div>
        <div>
          <div class="traveler-name">${p}</div>
          <div class="traveler-role">${i===0?'Primary Account':'Contributor'}</div>
        </div>
      </div>
    </div>`).join('');
}

function clearAllData() {
  if (!confirm('確定要清除所有支出、記事和設定嗎？此操作無法復原。')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

// ── Init ──
loadData();
document.getElementById('rate-input').value = state.rate;
document.getElementById('budget-input').value = state.budget;
document.getElementById('my-name-input').value = state.myName;
document.getElementById('people-input').value = state.people.join(',');
refreshPeopleUI();
refreshAll();
renderNotes();
renderTravelers();
</script>
</body>
</html>
